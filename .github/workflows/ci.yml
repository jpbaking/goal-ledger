name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unix:
    name: Unix shell, PowerShell 7, and validator (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check POSIX shell
        run: |
          sh -n install.sh
          if command -v shellcheck >/dev/null 2>&1; then shellcheck install.sh; fi
      - name: Run tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 -m unittest discover -s tests -v

  windows:
    name: Windows PowerShell installers and validator
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run Windows PowerShell 5.1 and PowerShell 7 tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s tests -v
