name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unix:
    name: Validator tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 -m unittest discover -s tests -v

  windows:
    name: Windows validator tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s tests -v
